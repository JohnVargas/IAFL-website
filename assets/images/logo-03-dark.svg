<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- LOGO 03: Campo aéreo — versión DARK (para fondos oscuros) -->
  
  <!-- Campo exterior -->
  <rect x="8" y="12" width="66" height="56" rx="4" fill="none" stroke="#22c55e" stroke-width="1.8"/>
  <!-- Línea central vertical -->
  <line x1="41" y1="12" x2="41" y2="68" stroke="#22c55e" stroke-width="1" stroke-dasharray="3 3" opacity="0.7"/>
  <!-- Círculo central -->
  <circle cx="41" cy="40" r="11" fill="none" stroke="#22c55e" stroke-width="1.4"/>
  <!-- Área izquierda -->
  <rect x="8" y="26" width="16" height="28" rx="2" fill="none" stroke="#22c55e" stroke-width="1.2"/>
  <!-- Área derecha -->
  <rect x="58" y="26" width="16" height="28" rx="2" fill="none" stroke="#22c55e" stroke-width="1.2"/>
  <!-- Punto de jugador analizado -->
  <circle cx="54" cy="33" r="4" fill="#00e5ff"/>
  <!-- Ondas de análisis -->
  <circle cx="54" cy="33" r="9" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.45"/>
  <circle cx="54" cy="33" r="15" fill="none" stroke="#00e5ff" stroke-width="0.6" opacity="0.2"/>

  <!-- Texto principal -->
  <text x="90" y="34" font-family="'Orbitron','Rajdhani',system-ui,sans-serif" font-weight="700" font-size="24" letter-spacing="3" fill="#ffffff">IAFL</text>
  <!-- Subtítulo -->
  <text x="91" y="52" font-family="'Rajdhani',system-ui,sans-serif" font-weight="400" font-size="11" letter-spacing="5" fill="rgba(255,255,255,0.6)">IA FÚTBOL LAB</text>
  <!-- Tagline -->
  <text x="91" y="67" font-family="'Rajdhani',system-ui,sans-serif" font-weight="600" font-size="8" letter-spacing="3" fill="#00e5ff">DIAGNÓSTICO COMPETITIVO</text>
</svg>
